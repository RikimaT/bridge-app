<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>Bridge 生徒管理システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0d1117; --surface: #161b22; --surface2: #1c2128; --border: #30363d; --accent: #e8a84c; --text: #e6edf3; --text-muted: #8b949e; --success: #3fb950; --radius: 12px; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; overflow-x: hidden; margin: 0; }
  header { text-align: center; padding: 24px 16px 0; }
  .logo { font-family:'DM Serif Display',serif; font-size: 32px; color:var(--accent); letter-spacing:2px; }
  .sub { font-size: 11px; color:var(--text-muted); letter-spacing:3px; margin-top:4px; text-transform:uppercase; }
  .main-tabs { display:flex; gap:4px; padding:16px 12px 0; max-width:680px; margin:0 auto; }
  .main-tab { flex:1; background:var(--surface2); border:1px solid var(--accent); border-bottom:none; border-radius:10px 10px 0 0; color:var(--accent); padding:14px 6px; font-size:13px; font-weight:600; text-align:center; }
  .content { max-width:680px; margin:0 auto; background:var(--surface2); border:1px solid var(--border); border-radius:0 0 var(--radius) var(--radius); padding:20px 14px 40px; }
  .section-title { font-size:11px; letter-spacing:2px; color:var(--accent); font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
  input[type=search] { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:13px; font-size:16px; margin-bottom:10px; }
  .month-btns { display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; scrollbar-width:none; margin-bottom:10px;}
  .month-btns::-webkit-scrollbar { display:none; }
  .mbtn { flex-shrink:0; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); padding:11px 16px; font-size:14px; cursor:pointer; text-align:center; transition:all .2s; }
  .mbtn.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }
  .summary-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
  .stat-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 8px; text-align:center; }
  .stat-val { font-family:'DM Serif Display',serif; font-size:20px; color:var(--accent); line-height:1.2; }
  .stat-lbl { font-size:11px; color:var(--text-muted); margin-top:4px; }
  .student-list { display:flex; flex-direction:column; gap:8px; max-height:60vh; overflow-y:auto; }
  .student-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; cursor:pointer; }
  .sc-header { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .sc-name { font-size:15px; font-weight:600; line-height:1.3; }
  .sc-total { font-size:15px; color:var(--accent); font-weight:700; flex-shrink:0; }
  .sc-courses-preview { font-size:12px; color:var(--text-muted); margin-top:4px; line-height:1.5; }
  .sc-detail { margin-top:12px; border-top:1px solid var(--border); padding-top:10px; display:none; }
  .student-card.expanded .sc-detail { display:block; }
  .detail-row { padding:7px 0; border-bottom:1px solid rgba(255,255,255,.04); font-size:13px; }
  .detail-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .detail-course { color:var(--text-muted); flex:1; line-height:1.4; }
  .detail-actual { color:var(--success); font-weight:600; display:block; text-align:right;}
  .nendo-btns { display:flex; gap:6px; margin-bottom:12px; }
  .nbtn { background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); padding:8px 18px; font-size:14px; cursor:pointer; font-weight:600; }
  .nbtn.active { background:var(--accent); border-color:var(--accent); color:#000; }
</style>
</head>
<body>
<header>
  <div class="logo">Bridge</div>
  <div class="sub">生徒管理システム</div>
</header>
<div class="main-tabs"><div class="main-tab">📊 売上照会</div></div>
<div class="content">
  <div class="section-title" id="salesTitle">カレンダー年 売上照会</div>
  <div class="nendo-btns" id="nendoBtns"></div>
  <div class="search-row">
    <input type="search" id="searchName" placeholder="🔍 生徒名で検索..." oninput="renderSales()">
    <div class="month-btns" id="monthBtns"></div>
  </div>
  <div class="summary-row" id="summaryRow"></div>
  <div class="student-list" id="studentList"></div>
</div>
<script>
// ★GASのURL★（代表の環境に合わせて変更不要です）
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxN7gr3pAEwkqhXMSdL4zHDeSrX_8axHZqo1gwUSGJiAr9IA0EMT4rt7KEtl6djJc1toQ/exec';

let ALL_SALES = {};
const CUR_YEAR = new Date().getFullYear();
let activeYear = String(CUR_YEAR);
let AVAILABLE_YEARS = [String(CUR_YEAR)];
let activeMonth = 'ALL'; // ★ 最初から「年間すべて」を表示する設定！

function loadSalesData() {
  document.getElementById('summaryRow').innerHTML = '<div style="grid-column:span 3;text-align:center;color:var(--text-muted);">スプレッドシートから全データを取得中...</div>';
  fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getSales' }) })
  .then(r => r.json())
  .then(res => {
    if (res.status === 'ok') {
      ALL_SALES = res.sales || {}; buildYearButtons(); buildMonthButtons(); renderSales();
    } else alert("エラー：GASのコードが古いです！「新バージョン」でデプロイしてください。");
  }).catch(() => document.getElementById('summaryRow').innerHTML = '<div style="grid-column:span 3;text-align:center;color:#f85149;">通信エラー</div>');
}

function buildYearButtons(){
  const dataYears = Object.keys(ALL_SALES).sort();
  if (dataYears.length > 0) AVAILABLE_YEARS = dataYears;
  if(!AVAILABLE_YEARS.includes(activeYear) && AVAILABLE_YEARS.length > 0) activeYear = AVAILABLE_YEARS[AVAILABLE_YEARS.length - 1];
  document.getElementById('nendoBtns').innerHTML = AVAILABLE_YEARS.map(y => '<button class="nbtn '+(y===activeYear?'active':'')+'" onclick="setYear(this.dataset.y)" data-y="'+y+'">'+y+'年</button>').join('');
}

function setYear(y){ activeYear=y; activeMonth='ALL'; buildYearButtons(); buildMonthButtons(); document.getElementById('searchName').value=''; renderSales(); }

function buildMonthButtons(){
  const months = [{label: '🌟年間すべて', key: 'ALL'}];
  for(let m=1; m<=12; m++) months.push({label: m+'月', key: activeYear+'年'+m+'月'});
  
  document.getElementById('monthBtns').innerHTML = months.map(m => '<button class="mbtn '+(m.key===activeMonth?'active':'')+'" data-m="'+m.key+'" onclick="setMonth(this.dataset.m)">'+m.label+'</button>').join('');
  document.getElementById('salesTitle').textContent = activeYear + '年 売上照会';
}

function setMonth(m){ activeMonth=m; document.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('active',b.dataset.m===m)); renderSales(); }

function renderSales(){
  const q = document.getElementById('searchName').value.trim().toLowerCase();
  const srcData = ALL_SALES[activeYear] || [];
  const monthData = activeMonth === 'ALL' ? srcData : srcData.filter(r => r.month === activeMonth);
  
  const map = {};
  monthData.forEach(r => { 
    if(!map[r.name]) map[r.name] = {name: r.name, rows: [], totalActual: 0}; 
    map[r.name].rows.push(r); 
    if(r.actual !== null) map[r.name].totalActual += r.actual; 
  });
  
  let students = Object.values(map);
  if(q) students = students.filter(s => s.name.toLowerCase().includes(q) || s.name.includes(q));
  students.sort((a,b) => a.name.localeCompare(b.name,'ja'));
  
  const tot = students.reduce((s,st) => s + st.totalActual, 0);
  document.getElementById('summaryRow').innerHTML = '<div class="stat-box"><div class="stat-val">'+students.length+'</div><div class="stat-lbl">表示生徒数</div></div><div class="stat-box" style="grid-column: span 2;"><div class="stat-val">¥'+tot.toLocaleString()+'</div><div class="stat-lbl">実績合計</div></div>';
  
  if(!students.length){ document.getElementById('studentList').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);">データがありません</div>'; return; }
  
  document.getElementById('studentList').innerHTML = students.map(s => {
    const detail = s.rows.map(r => '<div class="detail-row"><div class="detail-top"><span class="detail-course">'+(activeMonth==='ALL'?`[${r.month}] `:'')+r.course+(r.note?' ('+r.note+')':'')+'</span><div class="detail-prices"><span class="detail-actual">¥'+(r.actual||0).toLocaleString()+'</span></div></div></div>').join('');
    return '<div class="student-card" onclick="this.classList.toggle(\'expanded\')"><div class="sc-header"><div style="min-width:0;flex:1"><div class="sc-name">'+s.name+'</div><div class="sc-courses-preview">詳細を見る (タップ)</div></div><div class="sc-total">¥'+s.totalActual.toLocaleString()+'</div></div><div class="sc-detail">'+detail+'</div></div>';
  }).join('');
}

document.addEventListener('DOMContentLoaded', loadSalesData);
</script>
</body>
</html>
