<script>
// GASのiframeを全画面に強制スケールするハック
(function(){
  try {
    // 親フレームのiframeを取得して幅を100%に
    if(window.parent && window.parent !== window){
      var iframes = window.parent.document.querySelectorAll('iframe');
      iframes.forEach(function(f){
        f.style.width = '100%';
        f.style.height = '100vh';
        f.style.border = 'none';
        f.style.transform = 'none';
      });
    }
  } catch(e){}
  // document全体にズームリセット
  document.addEventListener('DOMContentLoaded', function(){
    document.documentElement.style.zoom = '1';
    document.body.style.zoom = '1';
    // iOSのscale強制リセット
    var meta = document.querySelector('meta[name=viewport]');
    if(meta){
      meta.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no';
    }
  });
})();
</script>

<script>
/* === 売上データ（GASリアルタイム取得） === */
let ALL_SALES = {};
let salesLoaded = false;
let salesLoading = false;

function loadSalesData(callback) {
  // リアルタイム取得：キャッシュなし
  if (salesLoading) { setTimeout(() => loadSalesData(callback), 300); return; }
  salesLoading = true;
  const loadingEl = document.getElementById('salesLoading');
  if (loadingEl) loadingEl.style.display = 'block';
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'getSales' })
  })
  .then(r => r.json())
  .then(res => {
    if (res.status === 'ok') {
      ALL_SALES = res.sales || {};
      salesLoaded = true;
    } else {
      console.error('売上データ取得エラー:', res.message);
    }
    salesLoading = false;
    if (loadingEl) loadingEl.style.display = 'none';
    callback && callback();
  })
  .catch(err => {
    console.error('売上データ通信エラー:', err);
    salesLoading = false;
    if (loadingEl) loadingEl.style.display = 'none';
    callback && callback();
  });

/* === 日付・年度（2月スタート〜1月終わり） === */
const NOW = new Date();
const CUR_YEAR = NOW.getFullYear();
const CUR_MONTH = NOW.getMonth() + 1;
const CUR_NENDO = CUR_MONTH >= 2 ? CUR_YEAR : CUR_YEAR - 1;
const IS_NEW_NENDO = CUR_MONTH >= 2;
const NENDO = CUR_NENDO;

document.getElementById('headerSub').textContent = '生徒管理システム ' + CUR_NENDO + '年度';

let activeNendo = String(CUR_NENDO);
const AVAILABLE_NENDOS = Object.keys(ALL_SALES).filter(n => parseInt(n) <= CUR_NENDO).sort();

function buildNendoButtons(){
  document.getElementById('nendoBtns').innerHTML = AVAILABLE_NENDOS.map(function(n){
    return '<button class="nbtn '+(n===activeNendo?'active':'')+'" onclick="setNendo(this.dataset.n)" data-n="'+n+'">'+n+'年度</button>';
  }).join('');
}
function setNendo(n){
  activeNendo=n; buildNendoButtons(); buildMonthButtons();
  document.getElementById('searchName').value='';
  if(chartVisible) drawChart();
  renderSales();
}

function buildMonthButtons(){
  const nendo=parseInt(activeNendo);
  const months=[];
  for(let m=2;m<=12;m++){
    const passed=CUR_NENDO>nendo||(CUR_NENDO===nendo&&CUR_MONTH>=m);
    if(passed) months.push({label:m+'月',key:nendo+'年'+m+'月'});
  }
  const janY=nendo+1;
  const janPassed=CUR_YEAR>janY||(CUR_YEAR===janY&&CUR_MONTH>=1);
  if(janPassed) months.push({label:'1月',key:janY+'年1月'});
  let curKey;
  if(activeNendo===String(CUR_NENDO)){
    curKey=CUR_MONTH===1?(nendo+1)+'年1月':nendo+'年'+CUR_MONTH+'月';
  } else {
    curKey=months[months.length-1]?.key||'';
  }
  activeMonth=(months.find(m=>m.key===curKey)||months[months.length-1]||{}).key||'';
  document.getElementById('monthBtns').innerHTML=months.map(function(m){
    return '<button class="mbtn '+(m.key===activeMonth?'active':'')+'" data-m="'+m.key+'" onclick="setMonth(this.dataset.m)">'+m.label+'</button>';
  }).join('');
  document.getElementById('salesTitle').textContent=activeNendo+'年度 月別売上照会';
  document.getElementById('nendoLabel').innerHTML='表示期間：<span>'+nendo+'年2月 〜 '+(nendo+1)+'年1月</span>　現在：<span>'+CUR_YEAR+'年'+CUR_MONTH+'月</span>';
}

  document.getElementById('courseGrid').innerHTML=list.map(c=>'<div class="course-item '+(selected.has(c.id)?'selected':'')+'" onclick="toggleCourse(\''+c.id+'\')"><div style="flex:1;min-width:0"><div class="cname">'+c.name+'</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">'+c.grade+'</div></div><div style="text-align:right;flex-shrink:0"><div class="cprice">¥'+c.price.toLocaleString()+'</div><div class="ccheck" style="margin-left:auto;margin-top:5px">'+(selected.has(c.id)?'✓':'')+'</div></div></div>').join('');
}
function toggleCourse(id){ selected.has(id)?selected.delete(id):selected.add(id); renderGrid(); renderTags(); updateTotal(); }
function renderTags(){
  const items=COURSES.filter(c=>selected.has(c.id));
  document.getElementById('selectedTags').innerHTML=items.length?'<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">選択中：</div>'+items.map(c=>'<span class="stag">'+c.name+'<button onclick="toggleCourse(\''+c.id+'\')">×</button></span>').join(''):'';
}
function updateTotal(){ const t=COURSES.filter(c=>selected.has(c.id)).reduce((s,c)=>s+c.price,0); document.getElementById('totalAmt').innerHTML='¥'+t.toLocaleString()+'<span>/ 月</span>'; }

// ★ここにGASのウェブアプリURLを貼り付けてください★
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxN7gr3pAEwkqhXMSdL4zHDeSrX_8axHZqo1gwUSGJiAr9IA0EMT4rt7KEtl6djJc1toQ/exec';

function submitData(){
  const name=document.getElementById('name').value.trim(), grade=document.getElementById('grade').value;
  if(!name||!grade){ showToast('氏名と学年は必須です',true); return; }
  if(!selected.size){ showToast('コースを1つ以上選択してください',true); return; }
  const courses=COURSES.filter(c=>selected.has(c.id)).map(c=>c.name).join('、');
  const total=COURSES.filter(c=>selected.has(c.id)).reduce((s,c)=>s+c.price,0);
  const payload={action:'addStudent',name,grade,school:document.getElementById('school').value,startDate:document.getElementById('startDate').value,courses,totalAmount:total,memo:document.getElementById('memo').value};
  const btn=document.getElementById('submitBtn'); btn.disabled=true; btn.textContent='送信中...';
  fetch(GAS_URL, {method:'POST', body:JSON.stringify(payload)})
    .then(r=>r.json())
    .then(res=>{
      if(res.status==='ok'){ showToast('✅ '+name+'さんを登録しました！'); resetForm(); }
      else { showToast('登録エラー：'+res.message, true); }
      btn.disabled=false; btn.textContent='📋 Googleスプレッドシートに登録する';
    })
    .catch(()=>{ showToast('通信エラーが発生しました',true); btn.disabled=false; btn.textContent='📋 Googleスプレッドシートに登録する'; });
}
function resetForm(){
  ['name','memo'].forEach(id=>document.getElementById(id).value='');
  ['grade','school'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('startDate').value=new Date().toISOString().split('T')[0];
  selected.clear(); renderGrid(); renderTags(); updateTotal();
}
function switchTab(t){
  document.querySelectorAll('.main-tab').forEach(el=>el.classList.remove('active'));
  const tabs=['register','manage','sales'];
  document.querySelectorAll('.main-tab').forEach((el,i)=>{ if(tabs[i]===t) el.classList.add('active'); });
  document.querySelectorAll('.tab-pane').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='sales') loadSalesData(renderSales);
  if(t==='manage') loadStudents();
}


let activeMonth='';

function setMonth(m){ activeMonth=m; document.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('active',b.dataset.m===m)); renderSales(); }

function renderSales(){
  const q=document.getElementById('searchName').value.trim().toLowerCase();
  const srcData=ALL_SALES[activeNendo]||[]; const monthData=srcData.filter(r=>r.month===activeMonth);
  const map={};
  monthData.forEach(r=>{ if(!map[r.name]) map[r.name]={name:r.name,rows:[],totalPrice:0,totalActual:0}; map[r.name].rows.push(r); map[r.name].totalPrice+=r.price; if(r.actual!==null) map[r.name].totalActual+=r.actual; });
  let students=Object.values(map);
  if(q) students=students.filter(s=>s.name.toLowerCase().includes(q)||s.name.includes(q));
  students.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  const tot=students.reduce((s,st)=>s+st.totalActual,0), totp=students.reduce((s,st)=>s+st.totalPrice,0);
  document.getElementById('summaryRow').innerHTML='<div class="stat-box"><div class="stat-val">'+students.length+'</div><div class="stat-lbl">表示生徒数</div></div><div class="stat-box"><div class="stat-val">¥'+tot.toLocaleString()+'</div><div class="stat-lbl">実績合計</div></div><div class="stat-box"><div class="stat-val">¥'+totp.toLocaleString()+'</div><div class="stat-lbl">請求合計</div></div>';
  if(!students.length){ document.getElementById('studentList').innerHTML='<div class="no-results">該当する生徒が見つかりません</div>'; return; }
  document.getElementById('studentList').innerHTML=students.map(s=>{
    const courses=s.rows.map(r=>r.course).join('・');
    const detail=s.rows.map(r=>'<div class="detail-row"><div class="detail-top"><span class="detail-course">'+r.course+(r.note?' ('+r.note+')':'')+'</span><div class="detail-prices"><span class="detail-price">¥'+r.price.toLocaleString()+'</span>'+(r.actual!==null?'<span class="detail-actual">→ ¥'+r.actual.toLocaleString()+'</span>':'<span class="detail-pending">未確定</span>')+'</div></div></div>').join('');
    return '<div class="student-card" onclick="this.classList.toggle(\'expanded\')"><div class="sc-header"><div style="min-width:0;flex:1"><div class="sc-name">'+s.name+'</div><div class="sc-courses-preview">'+courses+'</div></div><div class="sc-total">¥'+s.totalActual.toLocaleString()+'</div></div><div class="sc-detail">'+detail+'</div></div>';
  }).join('');
}

function showToast(msg,isError=false){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast'+(isError?' error':''); requestAnimationFrame(()=>t.classList.add('show')); setTimeout(()=>t.classList.remove('show'),3500); }

/* === 生徒管理 === */
let studentsCache = [];

function loadStudents() {
  const status = document.getElementById('manageStatus');
  const list = document.getElementById('manageList');
  status.style.display = 'block';
  status.textContent = '読み込み中...';
  list.innerHTML = '';

  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'getStudents' })
  })
  .then(r => r.json())
  .then(res => {
    if (res.status === 'ok') {
      studentsCache = res.students;
      status.style.display = 'none';
      renderManage();
    } else {
      status.textContent = 'エラー：' + res.message;
    }
  })
  .catch(() => { status.textContent = '通信エラーが発生しました'; });
}

function renderManage() {
  const q = document.getElementById('manageSearch').value.trim().toLowerCase();
  const filter = document.getElementById('manageFilter').value;
  const list = document.getElementById('manageList');

  let students = studentsCache;
  if (filter === 'active') students = students.filter(s => s.isActive);
  else if (filter === 'inactive') students = students.filter(s => !s.isActive);
  if (q) students = students.filter(s => s.name.toLowerCase().includes(q));

  students.sort((a, b) => a.name.localeCompare(b.name, 'ja'));

  if (!students.length) {
    list.innerHTML = '<div class="no-results">該当する生徒が見つかりません</div>';
    return;
  }

  list.innerHTML = students.map(s => {
    const activeEnrolls = s.enrollments ? s.enrollments.filter(e => e.isActive) : [];
    const totalAmount = activeEnrolls.reduce((sum, e) => sum + (e.overrideAmount || 0), 0);
    const enrollInfo = s.courses || (activeEnrolls.map(e => e.memo || '').filter(Boolean).join('・')) || '—';
    const statusBadge = s.isActive
      ? '<span style="font-size:11px;background:rgba(63,185,80,.15);color:var(--success);border-radius:4px;padding:2px 8px;margin-left:8px">在籍</span>'
      : '<span style="font-size:11px;background:rgba(248,81,73,.15);color:var(--danger);border-radius:4px;padding:2px 8px;margin-left:8px">退会</span>';

    const withdrawBtn = s.isActive ? `
      <button onclick="openWithdraw('${s.studentID}','${s.name}')" style="background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);border-radius:8px;color:var(--danger);padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit;min-height:36px">退会処理</button>` : '';

    const changeBtn = s.isActive && activeEnrolls.length > 0 ? `
      <button onclick="openChangeCourse('${s.studentID}','${s.name}',${JSON.stringify(activeEnrolls).replace(/'/g,"\'")})" style="background:rgba(232,168,76,.1);border:1px solid rgba(232,168,76,.3);border-radius:8px;color:var(--accent);padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit;min-height:36px">コース変更</button>` : '';

    return `<div class="student-card">
      <div class="sc-header">
        <div style="min-width:0;flex:1">
          <div class="sc-name">${s.name}${statusBadge}<span style="font-size:12px;color:var(--text-muted);margin-left:6px">${s.grade}</span></div>
          <div class="sc-courses-preview" style="margin-top:4px">${enrollInfo}</div>
        </div>
        ${totalAmount > 0 ? `<div class="sc-total">¥${totalAmount.toLocaleString()}</div>` : ''}
      </div>
      ${s.isActive ? `<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">${withdrawBtn}${changeBtn}</div>` : `<div style="font-size:12px;color:var(--text-muted);margin-top:8px">退会日：${s.withdrawDate || '—'}</div>`}
    </div>`;
  }).join('');
}

function openWithdraw(studentID, name) {
  const date = new Date().toISOString().split('T')[0];
  const d = prompt(`${name}さんを退会処理します。\n退会日を入力してください（例：2026/03/31）`, date.replace(/-/g, '/'));
  if (!d) return;
  if (!confirm(`${name}さんを ${d} で退会処理しますか？\nEnrollmentsシートのIsActiveがFALSEになります。`)) return;

  const btn = event.target;
  btn.disabled = true; btn.textContent = '処理中...';

  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'withdraw', studentID, withdrawDate: d })
  })
  .then(r => r.json())
  .then(res => {
    if (res.status === 'ok') {
      showToast('✅ ' + name + 'さんを退会処理しました');
      document.getElementById('manageFilter').value = 'active';
      loadStudents();
    } else {
      showToast('エラー：' + res.message, true);
      btn.disabled = false; btn.textContent = '退会処理';
    }
  })
  .catch(() => { showToast('通信エラー', true); btn.disabled = false; btn.textContent = '退会処理'; });
}

function openChangeCourse(studentID, name, enrollments) {
  if (enrollments.length === 1) {
    const e = enrollments[0];
    const cur = e.overrideAmount || 0;
    const newAmt = prompt(`${name}さんのコース変更\n現在の上書き月額：¥${cur.toLocaleString()}\n\n新しい月額を入力してください（数字のみ）`, cur);
    if (newAmt === null) return;
    const amt = parseInt(newAmt);
    if (isNaN(amt)) { showToast('金額が正しくありません', true); return; }
    const memo = prompt('変更メモ（任意）', e.memo || '');
    if (memo === null) return;

    fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'changeCourse', enrollID: e.enrollID, newAmount: amt, memo })
    })
    .then(r => r.json())
    .then(res => {
      if (res.status === 'ok') { showToast('✅ コースを変更しました'); loadStudents(); }
      else showToast('エラー：' + res.message, true);
    })
    .catch(() => showToast('通信エラー', true));
  } else {
    showToast('複数コースの場合はスプレッドシートで変更してください', true);
  }
}

/* === グラフ === */
let chartInstance=null, chartVisible=false;
function toggleChart(){
  chartVisible=!chartVisible;
  const canvas=document.getElementById('salesChart');
  const btn=document.getElementById('chartToggleBtn');
  canvas.style.display=chartVisible?'block':'none';
  btn.textContent=chartVisible?'📊 グラフを非表示':'📊 グラフを表示';
  btn.classList.toggle('open',chartVisible);
  if(chartVisible) drawChart();
}
function drawChart(){
  const srcData=ALL_SALES[activeNendo]||[];
  const nendo=parseInt(activeNendo);
  const monthOrder=[];
  for(let m=2;m<=12;m++) monthOrder.push({label:m+'月',key:nendo+'年'+m+'月'});
  monthOrder.push({label:'1月',key:(nendo+1)+'年1月'});
  const labels=[],actuals=[],unitPrices=[];
  monthOrder.forEach(mo=>{
    const md=srcData.filter(r=>r.month===mo.key);
    if(!md.length) return;
    const tot=md.reduce((s,r)=>s+(r.actual||0),0);
    const cnt=[...new Set(md.map(r=>r.name))].length;
    labels.push(mo.label); actuals.push(tot);
    unitPrices.push(cnt>0?Math.round(tot/cnt):0);
  });
  const canvas=document.getElementById('salesChart');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth, H=220;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const pad={top:20,bottom:38,left:60,right:55};
  const cW=W-pad.left-pad.right, cH=H-pad.top-pad.bottom;
  const n=labels.length; if(!n) return;
  const maxA=Math.max(...actuals)*1.15||1;
  const maxP=Math.max(...unitPrices)*1.15||1;
  const gap=cW/n, barW=gap*0.55;
  // グリッド
  for(let i=0;i<=4;i++){
    const y=pad.top+cH*(1-i/4);
    ctx.strokeStyle='rgba(48,54,61,0.8)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cW,y); ctx.stroke();
    ctx.fillStyle='#8b949e'; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText('¥'+(maxA*i/4/10000).toFixed(0)+'万',pad.left-4,y+4);
  }
  // 棒グラフ
  actuals.forEach((v,i)=>{
    const x=pad.left+gap*i+gap/2-barW/2;
    const bH=(v/maxA)*cH, y=pad.top+cH-bH;
    const g=ctx.createLinearGradient(0,y,0,y+bH);
    g.addColorStop(0,'rgba(232,168,76,0.9)'); g.addColorStop(1,'rgba(232,168,76,0.35)');
    ctx.fillStyle=g;
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(x,y,barW,bH,3); else ctx.rect(x,y,barW,bH);
    ctx.fill();
  });
  // 折れ線
  ctx.strokeStyle='#3fb950'; ctx.lineWidth=2; ctx.beginPath();
  unitPrices.forEach((v,i)=>{
    const x=pad.left+gap*i+gap/2, y=pad.top+cH*(1-v/maxP);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  unitPrices.forEach((v,i)=>{
    const x=pad.left+gap*i+gap/2, y=pad.top+cH*(1-v/maxP);
    ctx.fillStyle='#3fb950'; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
  });
  // X軸ラベル
  ctx.fillStyle='#8b949e'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  labels.forEach((l,i)=>{ ctx.fillText(l,pad.left+gap*i+gap/2,H-6); });
  // 右軸（単価）
  ctx.fillStyle='#3fb950'; ctx.font='10px sans-serif'; ctx.textAlign='left';
  for(let i=0;i<=4;i++){
    const y=pad.top+cH*(1-i/4);
    ctx.fillText('¥'+(maxP*i/4/1000).toFixed(0)+'k',W-pad.right+4,y+4);
  }
  // 凡例
  const lx=pad.left, ly=H-2;
  ctx.fillStyle='rgba(232,168,76,0.85)'; ctx.fillRect(lx,ly-8,12,8);
  ctx.fillStyle='#8b949e'; ctx.textAlign='left'; ctx.font='10px sans-serif';
  ctx.fillText('売上実績',lx+14,ly);
  ctx.fillStyle='#3fb950'; ctx.fillRect(lx+75,ly-5,14,2);
  ctx.fillStyle='#8b949e'; ctx.fillText('月別単価',lx+91,ly);
}
